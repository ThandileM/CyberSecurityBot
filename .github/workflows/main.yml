name: .NET Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore CyberSecurity/CyberSecurity/CyberSecurity.csproj

    - name: Build Project
      run: dotnet build CyberSecurity/CyberSecurity/CyberSecurity.csproj --no-restore
